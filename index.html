    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        body { font-family: 'Noto Sans KR', sans-serif; }
        
        .preview-card { transition: all 0.2s ease-in-out; }
        .preview-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1); }

        .canvas-bg {
            background-image: linear-gradient(45deg, #f1f5f9 25%, transparent 25%), 
                              linear-gradient(-45deg, #f1f5f9 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #f1f5f9 75%), 
                              linear-gradient(-45deg, transparent 75%, #f1f5f9 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: white;
        }

        .tab-btn { position: relative; }
        .tab-btn.active { color: #3b82f6; font-weight: 800; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 3px; background-color: #3b82f6; border-radius: 3px 3px 0 0; }
        
        .img-loading {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>

                <i class="fa-solid fa-filter mr-1.5"></i> 필터 이동

            { id: 105, app: 'app2', category: '기타 컷인 (Other Cut-ins)', key: 'criticalSmashTypo', label: '크리티컬 스매시' },
            { id: 106, app: 'app2', category: '기타 컷인 (Other Cut-ins)', key: 'fumbleGlitchTypo', label: '펌블 글리치' },
            { id: 107, app: 'app2', category: '기타 컷인 (Other Cut-ins)', key: 'actionStrikeTypo', label: '액션 스트라이크' },
            { id: 108, app: 'app2', category: '기타 컷인 (Other Cut-ins)', key: 'diagonalSlashTypo', label: '대각선 베기 등장' },
            { id: 109, app: 'app2', category: '기타 컷인 (Other Cut-ins)', key: 'cinematicImpactTypo', label: '시네마틱 임팩트 & 아웃' },
            { id: 110, app: 'app2', category: '기타 컷인 (Other Cut-ins)', key: 'dramaRevealTypo', label: '드라마틱 줌 리빌' },
            { id: 111, app: 'app2', category: '기타 컷인 (Other Cut-ins)', key: 'tensionPulseTypo', label: '긴장감 고조 (심박수)' },
            { id: 112, app: 'app2', category: '기타 컷인 (Other Cut-ins)', key: 'focusSpinTypo', label: '집중 스핀 등장' },
            { id: 113, app: 'app2', category: '기타 컷인 (Other Cut-ins)', key: 'dynamicExitTypo', label: '역동적 스와이프 퇴장' }
        ];

        let currentAppId = 'app1';
        let currentGroupedData = {};
        
        const galleryContainer = document.getElementById('gallery-container');
        const filterButtonsContainer = document.getElementById('filter-buttons-container');

        // 앱 데이터 초기화 및 필터 UI 렌더링
        function renderApp(appId) {
            currentAppId = appId;
            
            // 현재 앱의 데이터만 필터링하여 카테고리별로 그룹화
            const appData = manifest.filter(item => item.app === appId);
            currentGroupedData = {};
            appData.forEach(item => {
                if (!currentGroupedData[item.category]) currentGroupedData[item.category] = [];
                currentGroupedData[item.category].push(item);
            });
            
            const catNames = Object.keys(currentGroupedData);
            
            // 필터 버튼 생성
            filterButtonsContainer.innerHTML = '';
            
            // '전체 보기' 버튼
            const btnAll = document.createElement('button');
            btnAll.className = 'cat-filter-btn px-3 py-1.5 rounded-lg text-xs font-bold transition whitespace-nowrap bg-slate-100 text-slate-600 hover:bg-slate-200 border border-transparent';
            btnAll.textContent = '전체 보기';
            btnAll.dataset.cat = 'all';
            filterButtonsContainer.appendChild(btnAll);

            // 개별 카테고리 버튼
            catNames.forEach((catName) => {
                const btn = document.createElement('button');
                btn.className = 'cat-filter-btn px-3 py-1.5 rounded-lg text-xs font-bold transition whitespace-nowrap bg-slate-100 text-slate-600 hover:bg-slate-200 border border-transparent';
                btn.textContent = catName.split('(')[0].trim(); // 영문 괄호 전까지만 짧게 표시
                btn.dataset.cat = catName;
                filterButtonsContainer.appendChild(btn);
            });

            // 필터 버튼 클릭 이벤트 바인딩
            document.querySelectorAll('.cat-filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const targetCat = e.currentTarget.dataset.cat;
                    updateFilterActiveStyle(e.currentTarget);
                    renderGallery(targetCat);
                });
            });

            // 기본값으로 "첫 번째 카테고리" 렌더링 트리거
            const firstCategoryBtn = filterButtonsContainer.querySelectorAll('.cat-filter-btn')[1]; // 0은 '전체보기'
            if(firstCategoryBtn) firstCategoryBtn.click();
        }

        // 필터 활성화 UI 업데이트
        function updateFilterActiveStyle(activeBtn) {
            document.querySelectorAll('.cat-filter-btn').forEach(b => {
                // 비활성 스타일
                b.classList.remove('bg-blue-500', 'text-white', 'shadow-md', 'border-blue-600');
                b.classList.add('bg-slate-100', 'text-slate-600');
            });
            // 활성 스타일
            activeBtn.classList.remove('bg-slate-100', 'text-slate-600');
            activeBtn.classList.add('bg-blue-500', 'text-white', 'shadow-md', 'border-blue-600');
        }

        // 실제 갤러리 이미지(DOM) 렌더링
        function renderGallery(targetCat) {
            galleryContainer.innerHTML = '';
            
            // targetCat이 'all'이면 모든 카테고리를 배열로, 아니면 해당 카테고리 1개만 배열로 지정
            const catsToRender = targetCat === 'all' ? Object.keys(currentGroupedData) : [targetCat];

            catsToRender.forEach(catName => {
                const section = document.createElement('section');
                section.className = 'mb-12 animate-[fadeIn_0.3s_ease-out]';
                
                const title = document.createElement('h2');
                title.className = 'text-xl font-black text-slate-800 mb-4 border-b-2 border-slate-200 pb-2 flex items-center gap-2';
                title.innerHTML = `<span class="w-2 h-6 ${currentAppId === 'app1' ? 'bg-amber-500' : 'bg-purple-500'} rounded-full block"></span> ${catName}`;
                
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 sm:gap-6';

                currentGroupedData[catName].forEach(item => {
                    const paddedId = String(item.id).padStart(3, '0');
                    const fileName = `${paddedId}_${item.key}.gif`;
                    
                    const card = document.createElement('div');
                    card.className = 'preview-card bg-white rounded-xl overflow-hidden border border-slate-200 flex flex-col group cursor-pointer';
                    
                    card.innerHTML = `
                        <div class="w-full canvas-bg relative overflow-hidden flex items-center justify-center img-loading" style="aspect-ratio: 3/2;">
                            <img src="./images/${fileName}" alt="${item.label}" loading="lazy" class="w-full h-full object-contain relative z-10 transition-opacity duration-300 opacity-0" onload="this.classList.remove('opacity-0'); this.parentElement.classList.remove('img-loading')" onerror="this.parentElement.innerHTML='<span class=\\'text-xs text-red-400 font-bold\\'>이미지 없음</span>'">
                        </div>
                        <div class="p-3 flex items-center justify-between bg-white z-10 border-t border-slate-100">
                            <span class="text-sm font-bold text-slate-700 truncate" title="${item.label}">${item.label}</span>
                            <span class="text-[10px] font-mono text-slate-400 bg-slate-100 px-1 rounded transition-colors group-hover:bg-blue-100 group-hover:text-blue-600">GIF</span>
                        </div>
                    `;
                    
                    // 마우스 올렸을 때 애니메이션 처음부터 재생되게 (캐시 회피 트릭)
                    card.addEventListener('mouseenter', function() {
                        const img = this.querySelector('img');
                        if(img && img.complete && img.src.indexOf('이미지 없음') === -1) {
                            const currentSrc = img.src.split('?')[0]; 
                            img.src = currentSrc + '?t=' + new Date().getTime();
                        }
                    });

                    grid.appendChild(card);
                });

                section.appendChild(title);
                section.appendChild(grid);
                galleryContainer.appendChild(section);
            });
        }

        // 상단 앱(App) 탭 전환 이벤트 바인딩
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.currentTarget.classList.add('active');
                renderApp(e.currentTarget.dataset.app);
            });
        });

        // 초기 시작
        window.addEventListener('DOMContentLoaded', () => {
            renderApp('app1');
            
            // Tailwind 임시 애니메이션 추가
            const style = document.createElement('style');
            style.textContent = `
                @keyframes fadeIn {
                    from { opacity: 0; transform: translateY(10px); }
                    to { opacity: 1; transform: translateY(0); }
                }
            `;
            document.head.appendChild(style);
        });
    </script>
</body>
</html>
